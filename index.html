<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 A Special Message For You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0a0f 0%, #2d0d1a 50%, #1a0a0f 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .hearts-bg { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .floating-heart { position:absolute; animation:floatUp linear infinite; opacity:0; }
  @keyframes floatUp {
    0% { transform:translateY(100vh) rotate(0deg); opacity:0.6; }
    100% { transform:translateY(-100px) rotate(360deg); opacity:0; }
  }
  .card {
    position:relative; z-index:1;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,150,180,0.3);
    border-radius:24px; padding:40px 34px;
    max-width:460px; width:90%;
    text-align:center;
    backdrop-filter:blur(10px);
    box-shadow:0 0 60px rgba(255,80,120,0.2);
    display: flex;
    flex-direction: column;
  }
  .big-heart { font-size:52px; margin-bottom:14px; animation:pulse 1.5s ease-in-out infinite; display:block; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
  .from-text { font-size:12px; color:rgba(255,180,200,0.6); letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; }
  .message { font-size:19px; color:rgba(255,220,230,0.95); line-height:1.6; margin:16px 0 28px; font-style:italic; }
  .btns { display:flex; gap:14px; justify-content:center; }
  .btn { padding:13px 32px; border-radius:50px; font-size:16px; font-weight:600; cursor:pointer; border:none; transition:transform 0.15s, box-shadow 0.15s; }
  .btn-pink { background:linear-gradient(135deg,#ff6b9d,#ff3366); color:white; box-shadow:0 4px 20px rgba(255,80,120,0.45); }
  .btn-pink:hover { transform:scale(1.07); box-shadow:0 6px 28px rgba(255,80,120,0.65); }
  .btn-ghost { background:rgba(255,255,255,0.08); color:rgba(255,200,210,0.8); border:1px solid rgba(255,150,180,0.3); }
  .btn-ghost:hover { transform:scale(0.95); }
  .setup-title { font-size:22px; font-weight:700; color:#ff6b9d; margin-bottom:6px; }
  .setup-sub { font-size:13px; color:rgba(255,200,215,0.65); margin-bottom:26px; }
  .input-group { margin-bottom:14px; text-align:left; }
  .input-group label { font-size:12px; color:rgba(255,180,200,0.8); display:block; margin-bottom:5px; letter-spacing:1px; text-transform:uppercase; }
  .input-group input, .input-group textarea {
    width:100%; padding:11px 15px; border-radius:12px;
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,150,180,0.3);
    color:rgba(255,230,235,0.95); font-size:15px; font-family:inherit;
    outline:none; transition:border 0.2s; resize:none;
  }
  .input-group input::placeholder, .input-group textarea::placeholder { color:rgba(255,180,200,0.3); }
  .input-group input:focus, .input-group textarea:focus { border-color:rgba(255,100,160,0.6); }
  .link-box {
    margin-top:22px; background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,150,180,0.25); border-radius:14px; padding:16px;
  }
  .link-label { font-size:12px; color:rgba(255,180,200,0.7); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
  .link-url {
    font-size:12px; color:rgba(255,220,235,0.85); word-break:break-all;
    background:rgba(0,0,0,0.2); border-radius:8px; padding:10px 12px;
    margin-bottom:10px; text-align:left; line-height:1.5;
  }
  .copy-btn { padding:9px 22px; border-radius:50px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:linear-gradient(135deg,#ff6b9d,#ff3366); color:white; transition:transform 0.15s; }
  .copy-btn:hover { transform:scale(1.05); }
  .copied-msg { font-size:12px; color:#ff9dbe; margin-top:8px; opacity:0; transition:opacity 0.3s; }
  .try-msg { font-size:23px; font-weight:700; color:#ff6b9d; margin:14px 0 8px; }
  .try-sub { font-size:14px; color:rgba(255,220,230,0.8); margin-bottom:24px; line-height:1.6; }
  .yes-msg { font-size:25px; font-weight:700; color:#ff6b9d; margin:14px 0 8px; }
  .yes-sub { font-size:14px; color:rgba(255,220,230,0.85); line-height:1.6; }
  .hearts-row { font-size:26px; letter-spacing:5px; margin:14px 0; animation:pulse 1.5s infinite; display:block; }
  .confetti-piece { position:fixed; animation:confettiFall linear forwards; pointer-events:none; z-index:10; }
  @keyframes confettiFall {
    0% { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
  }
  .small-btn { font-size:12px; padding:9px 20px; margin-top:18px; align-self: center; }
</style>
</head>
<body>
<div class="hearts-bg" id="heartsBg"></div>

<!-- ১. সেটআপ প্যানেল (এখানে লিংক তৈরি হবে) -->
<div class="card" id="setupScreen">
  <span class="big-heart">💝</span>
  <div class="setup-title">Make Your Proposal</div>
  <div class="setup-sub">Customize & send to your special someone ✨</div>
  <div class="input-group">
    <label>Your Name</label>
    <input type="text" id="senderName" placeholder="e.g. Polash" maxlength="40" />
  </div>
  <div class="input-group">
    <label>Your Message to Her</label>
    <textarea id="customMsg" rows="3" placeholder="e.g. I love you, will you be my future waifu? 🥺"></textarea>
  </div>
  <button class="btn btn-pink" onclick="generateLink()">Generate Link 💖</button>
  <div class="link-box" id="linkBox" style="display:none">
    <div class="link-label">Your Shareable Link 🔗</div>
    <div class="link-url" id="linkUrl"></div>
    <button class="copy-btn" onclick="copyLink()">Copy Link 📋</button>
    <div class="copied-msg" id="copiedMsg">✅ Copied to clipboard!</div>
    <div style="font-size:12px; color:rgba(255,180,200,0.45); margin-top:10px;">Send this link to her 💌</div>
  </div>
</div>

<!-- ২. প্রপোজাল স্ক্রিন (যাকে লিংক পাঠাবেন সে এটি দেখবে) -->
<div class="card" id="proposalCard" style="display:none">
  <div class="from-text" id="fromText"></div>
  <span class="big-heart">💖</span>
  <p class="message" id="proposalMsg"></p>
  <div class="btns">
    <button class="btn btn-pink" onclick="sayYes()">Yes! 💖</button>
    <button class="btn btn-ghost" onclick="sayNo()">No 🙈</button>
  </div>
</div>

<!-- ৩. ট্রাই এগেন স্ক্রিন (No চাপলে বারবার অনুরোধ করার প্যানেল) -->
<div class="card" id="tryAgainScreen" style="display:none">
  <span class="big-heart">🥺</span>
  <div class="try-msg">Are you sure...? 😢</div>
  <p class="try-sub" id="tryAgainSub"></p>
  <button class="btn btn-pink" onclick="tryAgain()">দয়া করে আবার একটু চেষ্টা করুন 💖</button>
</div>

<!-- ৪. সফল স্ক্রিন (Yes চাপলে কংগ্রাচুলেশন দেখাবে) -->
<div class="card" id="yesScreen" style="display:none">
  <span class="big-heart">💍</span>
  <div class="yes-msg">Congratulations!! 🎉</div>
  <span class="hearts-row">💖💕💗💓💞</span>
  <p class="yes-sub" id="yesSub"></p>
  <br>
  <button class="btn btn-pink small-btn" onclick="resetAll()">Make another one 💌</button>
</div>

<script>
  const colors = ['#ff6b9d','#ff3366','#ffb3cc','#ff80aa','#ff1a6b','#ffcce0'];

  // ব্যাকগ্রাউন্ডে হার্ট ওড়া অ্যানিমেশন
  const hBg = document.getElementById('heartsBg');
  for(let i=0;i<18;i++){
    const h=document.createElement('div');
    h.className='floating-heart';
    h.textContent=['💖','💕','💗','💓','💞','❤️'][Math.floor(Math.random()*6)];
    h.style.left=Math.random()*100+'%';
    h.style.fontSize=(14+Math.random()*16)+'px';
    h.style.animationDuration=(4+Math.random()*6)+'s';
    h.style.animationDelay=(Math.random()*6)+'s';
    hBg.appendChild(h);
  }

  // লোড হওয়ার সময় ইউআরএল (URL) চেক করা
  window.addEventListener('load', () => {
    const p = new URLSearchParams(window.location.search);
    const name = p.get('from');
    const msg = p.get('msg');
    
    if(name && msg) {
      loadProposal(name, msg);
    } else {
      show('setupScreen');
    }
  });

  // কাস্টম লিংক জেনারেট করা
  function generateLink() {
    const name = document.getElementById('senderName').value.trim() || 'Someone Special';
    const msg = document.getElementById('customMsg').value.trim() || 'I love you, will you be my future waifu? 🥺';
    const base = window.location.href.split('?')[0];
    const url = `${base}?from=${encodeURIComponent(name)}&msg=${encodeURIComponent(msg)}`;
    document.getElementById('linkUrl').textContent = url;
    document.getElementById('linkBox').style.display = 'block';
  }

  // লিংক কপি করা
  function copyLink() {
    const url = document.getElementById('linkUrl').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const m = document.getElementById('copiedMsg');
      m.style.opacity = '1';
      setTimeout(() => m.style.opacity = '0', 2500);
    });
  }

  // প্রপোজাল ডাটা ইনপুট করা স্ক্রিনে
  function loadProposal(name, msg) {
    document.getElementById('fromText').textContent = `from ${name}, with love 💌`;
    document.getElementById('proposalMsg').textContent = `"${msg}"`;
    document.getElementById('tryAgainSub').textContent = `${name} আপনার জন্য পুরো হৃদয় নিয়ে অপেক্ষা করছে... দয়া করে আরেকবার ভেবে দেখুন? 💔`;
    document.getElementById('yesSub').textContent = `আপনারা অফিসিয়ালি এখন কিউটেস্ট কাপল! ${name}-এর হৃদয় খুশিতে আত্মহারা! 🥰`;
    show('proposalCard');
  }

  // No এবং Yes এর ফাংশনালিটি (The Loop Logic)
  function sayNo() { show('tryAgainScreen'); }
  function tryAgain() { show('proposalCard'); } // এটি আবার প্রপোজাল কার্ডে (Yes/No অপশনে) ফেরত নিয়ে যাবে
  function sayYes() { show('yesScreen'); launchConfetti(); }
  
  function resetAll() {
    history.replaceState(null, '', window.location.pathname);
    document.getElementById('senderName').value = '';
    document.getElementById('customMsg').value = '';
    document.getElementById('linkBox').style.display = 'none';
    show('setupScreen');
  }

  // স্ক্রিন টগল করার মাস্টার ফাংশন
  function show(id) {
    ['setupScreen','proposalCard','tryAgainScreen','yesScreen'].forEach(s => {
      document.getElementById(s).style.display = s === id ? 'flex' : 'none';
    });
  }

  // পার্টিকেল/কনফেটি অ্যানিমেশন (সফলতার পর)
  function launchConfetti() {
    for(let i=0;i<80;i++){
      setTimeout(()=>{
        const c=document.createElement('div');
        c.className='confetti-piece';
        c.style.left=Math.random()*100+'vw';
        c.style.background=colors[Math.floor(Math.random()*colors.length)];
        c.style.borderRadius=Math.random()>0.5?'50%':'2px';
        c.style.width=(6+Math.random()*10)+'px';
        c.style.height=(6+Math.random()*10)+'px';
        c.style.animationDuration=(2+Math.random()*3)+'s';
        c.style.animationDelay=Math.random()*2+'s';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),5000);
      },i*30);
    }
  }
</script>
</body>
</html>
